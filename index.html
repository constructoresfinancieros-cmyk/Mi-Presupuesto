<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Presupuesto | Expert Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; color: #1f2937; }
        .card-shadow { background: white; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .btn-main { background: #111827; color: white; border-radius: 16px; font-weight: 700; transition: 0.3s; }
        .btn-main:active { transform: scale(0.96); opacity: 0.9; }
        .input-field { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 14px; padding: 12px; width: 100%; outline: none; transition: 0.2s; }
        .input-field:focus { border-color: #10b981; ring: 2px ring-emerald-500; }
        .badge-income { background: #ecfdf5; color: #059669; }
        .badge-expense { background: #fef2f2; color: #dc2626; }
    </style>
</head>
<body class="pb-20">

    <div class="bg-slate-900 text-white p-6 rounded-b-[40px] shadow-xl mb-6">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-extrabold tracking-tight">Mi <span class="text-emerald-400">Presupuesto</span></h1>
            <span class="text-[10px] font-bold border border-slate-700 px-2 py-1 rounded-lg uppercase tracking-widest text-slate-400">Control de Caja</span>
        </div>
        
        <div class="text-center mb-6">
            <p class="text-xs text-slate-400 font-medium uppercase mb-1">Disponible Real (USD)</p>
            <h2 id="total-balance" class="text-5xl font-black text-white tracking-tighter">$0.00</h2>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div class="bg-slate-800/50 p-4 rounded-3xl border border-slate-700">
                <p class="text-[10px] font-bold text-emerald-400 uppercase">Ingresos</p>
                <p id="total-income" class="text-lg font-bold text-white">$0.00</p>
            </div>
            <div class="bg-slate-800/50 p-4 rounded-3xl border border-slate-700">
                <p class="text-[10px] font-bold text-rose-400 uppercase">Gastos</p>
                <p id="total-expense" class="text-lg font-bold text-white">$0.00</p>
            </div>
        </div>
    </div>

    <div class="px-5 space-y-6">
        
        <div class="card-shadow p-6">
            <h3 class="text-sm font-bold mb-4 flex items-center">
                <span class="mr-2">📝</span> NUEVO REGISTRO
            </h3>
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div class="col-span-2">
                        <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Descripción del rubro</label>
                        <input type="text" id="desc" placeholder="Ej: Pago de Nomina, Compra Mercado..." class="input-field text-sm">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Monto ($)</label>
                        <input type="number" id="amount" placeholder="0.00" class="input-field text-sm">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Tipo</label>
                        <select id="type" class="input-field text-sm font-bold">
                            <option value="expense">📉 Gasto</option>
                            <option value="income">📈 Ingreso</option>
                        </select>
                    </div>
                </div>
                <button onclick="addEntry()" class="w-full py-4 btn-main shadow-lg shadow-slate-200">
                    REGISTRAR MOVIMIENTO
                </button>
            </div>
        </div>

        <div class="card-shadow p-6">
            <h3 class="text-sm font-bold mb-4">ANÁLISIS POR RUBRO</h3>
            <div id="analytics" class="space-y-4 text-xs text-gray-400 italic text-center">
                Sin datos para analizar este mes.
            </div>
        </div>

        <div>
            <div class="flex justify-between items-center px-2 mb-4">
                <h3 class="font-bold text-slate-800">DETALLE CRONOLÓGICO</h3>
                <button onclick="clearAll()" class="text-[10px] font-bold text-rose-500 uppercase">Limpiar Todo</button>
            </div>
            <div id="ledger" class="space-y-3">
                </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('mi_presupuesto_v4')) || [];

        function addEntry() {
            const desc = document.getElementById('desc').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const type = document.getElementById('type').value;
            const now = new Date();
            const dateStr = now.toLocaleDateString('es-VE', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });

            if (!desc || !amount) return alert("Por favor, completa los campos.");

            db.unshift({ desc, amount, type, date: dateStr, id: Date.now() });
            
            document.getElementById('desc').value = '';
            document.getElementById('amount').value = '';
            update();
        }

        function deleteEntry(id) {
            db = db.filter(item => item.id !== id);
            update();
        }

        function update() {
            const ledger = document.getElementById('ledger');
            const analytics = document.getElementById('analytics');
            ledger.innerHTML = '';
            
            let inc = 0, exp = 0;
            let group = {};

            db.forEach(item => {
                if (item.type === 'income') inc += item.amount;
                else {
                    exp += item.amount;
                    group[item.desc] = (group[item.desc] || 0) + item.amount;
                }

                const card = document.createElement('div');
                card.className = "card-shadow p-4 flex justify-between items-center border-l-4 " + (item.type === 'income' ? 'border-emerald-500' : 'border-rose-500');
                card.innerHTML = `
                    <div class="flex-1">
                        <div class="flex justify-between items-start">
                            <h4 class="font-bold text-slate-800 text-sm">${item.desc}</h4>
                            <span class="font-black ${item.type === 'income' ? 'text-emerald-500' : 'text-slate-900'}">
                                ${item.type === 'income' ? '+' : '-'}$${item.amount.toFixed(2)}
                            </span>
                        </div>
                        <div class="flex justify-between items-center mt-1">
                            <p class="text-[9px] text-gray-400 font-bold uppercase">${item.date}</p>
                            <button onclick="deleteEntry(${item.id})" class="text-[9px] text-rose-400 font-bold hover:underline">ELIMINAR</button>
                        </div>
                    </div>
                `;
                ledger.appendChild(card);
            });

            // Actualizar Totales
            document.getElementById('total-balance').innerText = `$${(inc - exp).toLocaleString('en-US', {minimumFractionDigits: 2})}`;
            document.getElementById('total-income').innerText = `$${inc.toFixed(2)}`;
            document.getElementById('total-expense').innerText = `$${exp.toFixed(2)}`;

            // Actualizar Analítica
            if (Object.keys(group).length > 0) {
                analytics.innerHTML = '';
                analytics.classList.remove('italic', 'text-center');
                for (let key in group) {
                    const perc = ((group[key] / exp) * 100).toFixed(0);
                    const bar = document.createElement('div');
                    bar.innerHTML = `
                        <div class="flex justify-between mb-1 font-bold text-slate-600">
                            <span>${key}</span>
                            <span>$${group[key].toFixed(2)} (${perc}%)</span>
                        </div>
                        <div class="w-full bg-gray-100 h-1.5 rounded-full">
                            <div class="bg-slate-800 h-full rounded-full" style="width: ${perc}%"></div>
                        </div>
                    `;
                    analytics.appendChild(bar);
                }
            } else {
                analytics.innerHTML = 'Sin datos para analizar este mes.';
            }

            localStorage.setItem('mi_presupuesto_v4', JSON.stringify(db));
        }

        function clearAll() {
            if (confirm("¿Borrar todos los datos?")) { db = []; update(); }
        }

        update();
    </script>
</body>
</html>
