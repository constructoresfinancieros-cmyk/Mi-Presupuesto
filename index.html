<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Presupuesto | Sistema de Flujo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #fdfdfd; --card: #ffffff; --primary: #0f172a; }
        body { background-color: var(--bg); font-family: 'Inter', sans-serif; }
        .neo-card { border-radius: 24px; background: var(--card); border: 1px solid #f1f5f9; box-shadow: 0 4px 30px rgba(0,0,0,0.02); }
        .progress-fill { transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="p-4 md:p-10 max-w-5xl mx-auto">

    <div class="flex flex-col md:flex-row justify-between items-end mb-10 gap-4">
        <div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tight">Mi <span class="text-indigo-600">Presupuesto</span></h1>
            <p class="text-slate-400 font-bold text-xs uppercase tracking-widest">Gestión de Flujo de Caja v2.0</p>
        </div>
        <div class="flex gap-2">
            <button onclick="resetAll()" class="px-4 py-2 text-xs font-bold text-rose-500 bg-rose-50 rounded-xl">Reiniciar Ciclo</button>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="space-y-6">
            <div class="neo-card p-6 border-t-4 border-indigo-600">
                <h3 class="font-bold text-slate-800 mb-4">Ingresar Movimiento</h3>
                <div class="space-y-4">
                    <input type="text" id="desc" placeholder="Descripción (ej. Consultoría)" class="w-full p-3 rounded-xl bg-slate-50 border-none text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                    <input type="number" id="amt" placeholder="Monto USD" class="w-full p-3 rounded-xl bg-slate-50 border-none text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                    <select id="cat" class="w-full p-3 rounded-xl bg-slate-50 border-none text-sm font-bold text-slate-600">
                        <option value="ingreso">💰 Ingreso (Entrada)</option>
                        <option value="fijo">🏠 Gasto Fijo (Vivienda/Servicios)</option>
                        <option value="variable">🛒 Variable (Comida/Ocio)</option>
                        <option value="inversion">📈 Inversión/Ahorro</option>
                    </select>
                    <button onclick="save()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold shadow-xl active:scale-95 transition-all">Ejecutar Registro</button>
                </div>
            </div>

            <div class="neo-card p-6 space-y-4">
                <div class="flex justify-between">
                    <span class="text-xs font-bold text-slate-400">DISPONIBLE</span>
                    <span id="bal" class="font-black text-slate-900">$0.00</span>
                </div>
                <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                    <div id="main-progress" class="progress-fill h-full bg-indigo-600" style="width: 0%"></div>
                </div>
                <p id="health-msg" class="text-[10px] font-bold text-slate-400 italic text-center uppercase">Sin movimientos</p>
            </div>
        </div>

        <div class="lg:col-span-2 space-y-6">
            <div class="neo-card p-6">
                <h3 class="font-bold text-slate-800 mb-6">Análisis de Evolución por Categoría</h3>
                <canvas id="barChart" height="150"></canvas>
            </div>

            <div class="neo-card overflow-hidden">
                <div class="p-6 border-b border-slate-50">
                    <h3 class="font-bold text-slate-800 text-sm">Libro Diario</h3>
                </div>
                <div class="max-h-[300px] overflow-y-auto">
                    <table class="w-full text-left">
                        <tbody id="rows" class="text-sm">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let items = JSON.parse(localStorage.getItem('budget_expert_v2')) || [];
        let chart;

        function initChart() {
            const ctx = document.getElementById('barChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Fijos', 'Variables', 'Inversión'],
                    datasets: [{
                        label: 'Gasto Real ($)',
                        data: [0, 0, 0],
                        backgroundColor: ['#4f46e5', '#f59e0b', '#10b981'],
                        borderRadius: 8
                    }]
                },
                options: { 
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, grid: { display: false } }, x: { grid: { display: false } } }
                }
            });
        }

        function save() {
            const desc = document.getElementById('desc').value;
            const amt = parseFloat(document.getElementById('amt').value);
            const cat = document.getElementById('cat').value;

            if(!desc || !amt) return;

            items.unshift({ desc, amt, cat, t: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
            document.getElementById('desc').value = '';
            document.getElementById('amt').value = '';
            update();
        }

        function update() {
            const rows = document.getElementById('rows');
            rows.innerHTML = '';
            
            let res = { ingreso: 0, fijo: 0, variable: 0, inversion: 0 };

            items.forEach((item, index) => {
                res[item.cat] += item.amt;

                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-50 hover:bg-slate-50 transition-colors";
                tr.innerHTML = `
                    <td class="p-4 font-bold text-slate-700">${item.desc} <br> <span class="text-[10px] text-slate-400 uppercase font-bold">${item.t}</span></td>
                    <td class="p-4 text-center"><span class="px-2 py-1 rounded-md text-[9px] font-black uppercase ${item.cat === 'ingreso' ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100 text-slate-500'}">${item.cat}</span></td>
                    <td class="p-4 text-right font-black ${item.cat === 'ingreso' ? 'text-emerald-500' : 'text-slate-900'}">${item.cat === 'ingreso' ? '+' : '-'}$${item.amt.toFixed(2)}</td>
                `;
                rows.appendChild(tr);
            });

            const totalExp = res.fijo + res.variable + res.inversion;
            const balance = res.ingreso - totalExp;
            
            document.getElementById('bal').innerText = `$${balance.toFixed(2)}`;
            
            // Salud Financiera
            const progress = res.ingreso > 0 ? (totalExp / res.ingreso) * 100 : 0;
            document.getElementById('main-progress').style.width = `${Math.min(progress, 100)}%`;
            
            const msg = document.getElementById('health-msg');
            if(progress > 90) { msg.innerText = "⚠️ Peligro: Sobrepasa capacidad"; msg.className="text-[10px] font-bold text-rose-500 uppercase text-center"; }
            else if(progress > 0) { msg.innerText = "✅ Flujo Controlado"; msg.className="text-[10px] font-bold text-emerald-500 uppercase text-center"; }

            // Chart Update
            chart.data.datasets[0].data = [res.fijo, res.variable, res.inversion];
            chart.update();

            localStorage.setItem('budget_expert_v2', JSON.stringify(items));
        }

        function resetAll() { if(confirm("¿Reiniciar?")) { items = []; update(); } }

        initChart();
        update();
    </script>
</body>
</html>
