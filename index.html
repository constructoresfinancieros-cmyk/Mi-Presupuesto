<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Control Financiero</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #2ecc71;
            --secondary: #3498db;
            --dark: #2c3e50;
            --light: #ecf0f1;
            --danger: #e74c3c;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; color: var(--dark); }
        .container { max-width: 500px; margin: auto; }
        .header { background: var(--dark); color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .balance { font-size: 2.5rem; font-weight: bold; margin: 10px 0; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .btn-save { background: var(--primary); color: white; margin-bottom: 10px; }
        .btn-auto { background: var(--secondary); color: white; }
        .list-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .list-item.gasto { border-left: 4px solid var(--danger); }
        .list-item.ingreso { border-left: 4px solid var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <small>Saldo Disponible</small>
        <div class="balance" id="total-balance">$0.00</div>
    </div>

    <div class="card">
        <h3><i class="fas fa-plus-circle"></i> Nuevo Registro</h3>
        <div class="form-group">
            <input type="text" id="desc" placeholder="Descripción (ej. Mercado, Pago Cliente)">
        </div>
        <div class="form-group">
            <input type="number" id="monto" placeholder="Monto (Ej. 50.50)">
        </div>
        <div class="form-group">
            <select id="tipo">
                <option value="gasto">Gasto</option>
                <option value="ingreso">Ingreso</option>
            </select>
        </div>
        <button class="btn-save" onclick="agregarRegistro()">Guardar Registro</button>
        
        <hr>
        <p style="font-size: 0.8rem; color: #666; text-align: center;">Automatización por Archivo Bancario</p>
        <input type="file" id="fileInput" style="display:none" onchange="procesarArchivo(this)">
        <button class="btn-auto" onclick="document.getElementById('fileInput').click()">
            <i class="fas fa-magic"></i> Importar Movimientos
        </button>
    </div>

    <div class="card">
        <canvas id="ctx"></canvas>
    </div>

    <div class="card">
        <h3>Movimientos Recientes</h3>
        <div id="lista-movimientos"></div>
    </div>
</div>

<script>
    let movimientos = JSON.parse(localStorage.getItem('movimientos')) || [];
    let myChart;

    function agregarRegistro() {
        const desc = document.getElementById('desc').value;
        const monto = parseFloat(document.getElementById('monto').value);
        const tipo = document.getElementById('tipo').value;

        if (desc && monto) {
            movimientos.push({ desc, monto, tipo, fecha: new Date().toLocaleDateString() });
            actualizarInterfaz();
            limpiarForm();
        }
    }

    function procesarArchivo(input) {
        // Simulación de automatización leyendo un archivo CSV o TXT
        alert("¡Procesando archivo bancario! Los datos se han categorizado automáticamente.");// Aquí se añadiría la lógica de lectura de archivos real
        movimientos.push({ desc: "Pago Automatizado (Banco)", monto: 125.40, tipo: "ingreso", fecha: "Hoy" });
        actualizarInterfaz();
    }

    function actualizarInterfaz() {
        localStorage.setItem('movimientos', JSON.stringify(movimientos));
        const lista = document.getElementById('lista-movimientos');
        lista.innerHTML = '';
        
        let saldo = 0;
        let gastos = 0;
        let ingresos = 0;

        movimientos.forEach(m => {
            if (m.tipo === 'ingreso') {
                saldo += m.monto;
                ingresos += m.monto;
            } else {
                saldo -= m.monto;
                gastos += m.monto;
            }

            const item = document.createElement('div');
            item.className = list-item ${m.tipo};
            item.innerHTML = `<span>${m.desc} <br><small>${m.fecha}</small></span> 
                             <strong>${m.tipo === 'gasto' ? '-' : '+'}$${m.monto.toFixed(2)}</strong>`;
            lista.prepend(item);
        });

        document.getElementById('total-balance').innerText = $${saldo.toFixed(2)};
        renderGrafico(ingresos, gastos);
    }

    function renderGrafico(ing, gas) {
        const ctx = document.getElementById('ctx').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Ingresos', 'Gastos'],
                datasets: [{
                    data: [ing, gas],
                    backgroundColor: ['#2ecc71', '#e74c3c']
                }]
            }
        });
    }

    function limpiarForm() {
        document.getElementById('desc').value = '';
        document.getElementById('monto').value = '';
    }

    // Carga inicial
    actualizarInterfaz();
</script>

</body>
</html>
