<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Presupuesto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .card-pro { background: white; border-radius: 28px; box-shadow: 0 15px 35px rgba(0,0,0,0.03); }
        .input-pro { background: #f8fafc; border: 2px solid #f1f5f9; border-radius: 18px; padding: 1rem; width: 100%; transition: all 0.3s; outline: none; }
        .input-pro:focus { border-color: #10b981; background: white; }
        .btn-add { background: #0f172a; color: white; border-radius: 18px; font-weight: 800; transition: all 0.2s; }
        .btn-add:active { transform: scale(0.95); }
        .status-pill { padding: 4px 12px; border-radius: 99px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
    </style>
</head>
<body class="pb-10">

    <div class="bg-white p-6 pb-10 rounded-b-[40px] shadow-sm mb-6">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-extrabold text-slate-800">Mi <span class="text-emerald-500">Presupuesto</span></h1>
            <div class="bg-slate-100 px-3 py-1 rounded-full text-[10px] font-black text-slate-500">USD $</div>
        </div>
        
        <div class="grid grid-cols-2 gap-4">
            <div class="p-4 bg-emerald-50 rounded-3xl">
                <p class="text-[10px] font-bold text-emerald-600 uppercase mb-1">Ingresos Totales</p>
                <h3 id="top-income" class="text-xl font-black text-emerald-700">$0.00</h3>
            </div>
            <div class="p-4 bg-rose-50 rounded-3xl">
                <p class="text-[10px] font-bold text-rose-600 uppercase mb-1">Gastos Totales</p>
                <h3 id="top-expense" class="text-xl font-black text-rose-700">$0.00</h3>
            </div>
            <div class="col-span-2 p-6 bg-slate-900 rounded-[32px] text-center mt-2">
                <p class="text-xs font-bold text-slate-400 uppercase mb-1 tracking-widest">Disponible Real</p>
                <h2 id="top-balance" class="text-4xl font-black text-white">$0.00</h2>
            </div>
        </div>
    </div>

    <div class="px-5 space-y-6">
        
        <div class="card-pro p-6">
            <h3 class="text-sm font-black text-slate-800 mb-4 flex items-center">
                <span class="mr-2">📝</span> AGREGAR NUEVO RUBRO
            </h3>
            <div class="space-y-3">
                <input type="text" id="name" placeholder="Nombre del rubro (ej. Alquiler)" class="input-pro text-sm">
                
                <div class="grid grid-cols-2 gap-3">
                    <select id="cat" class="input-pro text-sm font-bold text-slate-600">
                        <option value="ingreso">💰 Ingreso</option>
                        <option value="vivienda">🏠 Vivienda</option>
                        <option value="comida">🛒 Alimentación</option>
                        <option value="transporte">🚗 Transporte</option>
                        <option value="servicios">⚡ Servicios</option>
                        <option value="ocio">🎉 Ocio/Varios</option>
                    </select>
                    <input type="number" id="val" placeholder="Monto $" class="input-pro text-sm">
                </div>
                
                <button onclick="add()" class="w-full py-4 btn-add shadow-lg shadow-slate-200">
                    REGISTRAR EN EL MES
                </button>
            </div>
        </div>

        <div class="card-pro p-6">
            <h3 class="text-sm font-black text-slate-800 mb-4">DISTRIBUCIÓN DEL DINERO</h3>
            <div id="stats" class="space-y-4 text-gray-400 text-xs italic text-center py-4">
                Agrega rubros para ver el análisis.
            </div>
        </div>

        <div>
            <div class="flex justify-between items-center mb-4 px-2">
                <h3 class="font-black text-slate-800 text-sm">DETALLE DEL PRESUPUESTO</h3>
                <button onclick="reset()" class="text-[10px] font-bold text-rose-500 uppercase">Borrar Mes</button>
            </div>
            <div id="list" class="space-y-3">
                </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('presupuesto_v3')) || [];

        function add() {
            const name = document.getElementById('name').value;
            const val = parseFloat(document.getElementById('val').value);
            const cat = document.getElementById('cat').value;

            if(!name || !val) return alert("Por favor rellena todos los campos");

            db.unshift({ name, val, cat, id: Date.now() });
            document.getElementById('name').value = '';
            document.getElementById('val').value = '';
            render();
        }

        function render() {
            const list = document.getElementById('list');
            const stats = document.getElementById('stats');
            list.innerHTML = '';
            
            let inc = 0, exp = 0;
            let categories = {};

            db.forEach(item => {
                if(item.cat === 'ingreso') {
                    inc += item.val;
                } else {
                    exp += item.val;
                    categories[item.cat] = (categories[item.cat] || 0) + item.val;
                }

                const row = document.createElement('div');
                row.className = "flex justify-between items-center p-5 bg-white rounded-[24px] shadow-sm border border-slate-50";
                row.innerHTML = `
                    <div class="flex items-center">
                        <div class="w-10 h-10 rounded-full flex items-center justify-center mr-3 ${item.cat === 'ingreso' ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100 text-slate-500'}">
                            ${item.cat === 'ingreso' ? '↑' : '↓'}
                        </div>
                        <div>
                            <p class="font-bold text-slate-800 text-sm">${item.name}</p>
                            <p class="text-[9px] font-black uppercase text-slate-400">${item.cat}</p>
                        </div>
                    </div>
                    <p class="font-black ${item.cat === 'ingreso' ? 'text-emerald-500' : 'text-slate-800'}">
                        ${item.cat === 'ingreso' ? '+' : '-'}$${item.val.toFixed(2)}
                    </p>
                `;
                list.appendChild(row);
            });

            // Update Totals
            document.getElementById('top-income').innerText = `$${inc.toFixed(2)}`;
            document.getElementById('top-expense').innerText = `$${exp.toFixed(2)}`;
            document.getElementById('top-balance').innerText = `$${(inc - exp).toFixed(2)}`;

            // Build Stats
            if(Object.keys(categories).length > 0) {
                stats.innerHTML = '';
                stats.classList.remove('italic', 'text-center');
                for (let c in categories) {
                    const p = ((categories[c] / exp) * 100).toFixed(0);
                    const bar = document.createElement('div');
                    bar.innerHTML = `
                        <div class="flex justify-between text-[10px] font-black uppercase mb-1 text-slate-500">
                            <span>${c}</span>
                            <span>$${categories[c].toFixed(2)} (${p}%)</span>
                        </div>
                        <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                            <div class="h-full bg-slate-900" style="width: ${p}%"></div>
                        </div>
                    `;
                    stats.appendChild(bar);
                }
            } else {
                stats.innerHTML = 'Agrega rubros para ver el análisis.';
            }

            localStorage.setItem('presupuesto_v3', JSON.stringify(db));
        }

        function reset() { if(confirm("¿Reiniciar presupuesto del mes?")) { db = []; render(); } }
        render();
    </script>
</body>
</html>
