<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Presupuesto | Dashboard Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .card-pro { background: white; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid #f1f5f9; }
        .input-pro { background: #f1f5f9; border: 2px solid transparent; border-radius: 14px; padding: 12px; outline: none; transition: 0.3s; width: 100%; font-size: 14px; }
        .input-pro:focus { border-color: #3b82f6; background: white; }
        .btn-pro { background: #0f172a; color: white; border-radius: 14px; font-weight: 800; transition: 0.2s; }
        .btn-pro:active { transform: scale(0.97); }
    </style>
</head>
<body class="p-4 md:p-10 pb-20">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-800 tracking-tight">Mi <span class="text-blue-600">Presupuesto</span></h1>
            <button onclick="reset()" class="text-[10px] font-black text-rose-500 uppercase tracking-widest bg-rose-50 px-3 py-2 rounded-lg">Reiniciar Ciclo</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="card-pro p-6 bg-slate-900 text-white md:col-span-1">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Disponible Real</p>
                <h2 id="total-balance" class="text-4xl font-800">$0.00</h2>
            </div>
            <div class="card-pro p-6 flex justify-between items-center">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 text-emerald-500">Ingresos</p>
                    <h3 id="total-income" class="text-2xl font-800 text-slate-800">$0.00</h3>
                </div>
                <div class="w-12 h-12 bg-emerald-50 rounded-full flex items-center justify-center text-emerald-500">↑</div>
            </div>
            <div class="card-pro p-6 flex justify-between items-center">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 text-rose-500">Gastos</p>
                    <h3 id="total-expense" class="text-2xl font-800 text-slate-800">$0.00</h3>
                </div>
                <div class="w-12 h-12 bg-rose-50 rounded-full flex items-center justify-center text-rose-500">↓</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="card-pro p-6">
                    <h3 class="font-800 text-sm mb-4 uppercase">Nuevo Rubro</h3>
                    <div class="space-y-4">
                        <input type="text" id="desc" placeholder="Descripción (ej: Mercado)" class="input-pro">
                        <div class="flex gap-2">
                            <input type="number" id="amt" placeholder="Monto $" class="input-pro">
                            <select id="type" class="input-pro font-bold">
                                <option value="exp">Gasto</option>
                                <option value="inc">Ingreso</option>
                            </select>
                        </div>
                        <button onclick="add()" class="w-full py-4 btn-pro shadow-xl shadow-slate-200">REGISTRAR</button>
                    </div>
                </div>

                <div class="card-pro p-6">
                    <h3 class="font-800 text-sm mb-4 uppercase text-center">Distribución de Gastos</h3>
                    <canvas id="chartExpenses"></canvas>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="card-pro overflow-hidden">
                    <div class="p-6 border-b border-slate-50 flex justify-between items-center">
                        <h3 class="font-800 text-sm uppercase">Cronología de Movimientos</h3>
                    </div>
                    <div id="ledger" class="divide-y divide-slate-50 max-h-[600px] overflow-y-auto">
                        <p class="p-10 text-center text-slate-400 text-sm italic">No hay registros este mes.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('budget_expert_db')) || [];
        let chart;

        function initChart() {
            const ctx = document.getElementById('chartExpenses').getContext('2d');
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: [],
                    datasets: [{
                        data: [],
                        backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#6366f1'],
                        borderWidth: 0,
                    }]
                },
                options: { cutout: '70%', plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10, weight: 'bold' } } } } }
            });
        }

        function add() {
            const desc = document.getElementById('desc').value;
            const amt = parseFloat(document.getElementById('amt').value);
            const type = document.getElementById('type').value;
            if(!desc || !amt) return;

            db.unshift({ desc, amt, type, id: Date.now(), date: new Date().toLocaleDateString('es-VE', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'}) });
            document.getElementById('desc').value = '';
            document.getElementById('amt').value = '';
            update();
        }

        function update() {
            const ledger = document.getElementById('ledger');
            ledger.innerHTML = '';
            let inc = 0, exp = 0;
            let categories = {};

            db.forEach(item => {
                if(item.type === 'inc') inc += item.amt;
                else {
                    exp += item.amt;
                    categories[item.desc] = (categories[item.desc] || 0) + item.amt;
                }

                const div = document.createElement('div');
                div.className = "p-4 flex justify-between items-center hover:bg-slate-50 transition-all";
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-2 h-10 rounded-full ${item.type === 'inc' ? 'bg-emerald-400' : 'bg-rose-400'}"></div>
                        <div>
                            <p class="font-bold text-slate-800">${item.desc}</p>
                            <p class="text-[10px] font-bold text-slate-400 uppercase">${item.date}</p>
                        </div>
                    </div>
                    <p class="font-900 ${item.type === 'inc' ? 'text-emerald-500' : 'text-slate-900'}">
                        ${item.type === 'inc' ? '+' : '-'}$${item.amt.toFixed(2)}
                    </p>
                `;
                ledger.appendChild(div);
            });

            document.getElementById('total-balance').innerText = `$${(inc - exp).toLocaleString()}`;
            document.getElementById('total-income').innerText = `$${inc.toFixed(2)}`;
            document.getElementById('total-expense').innerText = `$${exp.toFixed(2)}`;

            if(Object.keys(categories).length > 0) {
                chart.data.labels = Object.keys(categories);
                chart.data.datasets[0].data = Object.values(categories);
                chart.update();
            }

            localStorage.setItem('budget_expert_db', JSON.stringify(db));
        }

        function reset() { if(confirm("¿Reiniciar?")) { db = []; update(); } }
        initChart();
        update();
    </script>
</body>
</html>
