<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Wallet | Inteligencia Financiera</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .card-pro { background: white; border-radius: 24px; box-shadow: 0 4px 25px rgba(0,0,0,0.04); border: 1px solid #f1f5f9; }
        .input-pro { background: #f1f5f9; border: 2px solid transparent; border-radius: 14px; padding: 12px; outline: none; transition: 0.3s; width: 100%; font-size: 14px; }
        .input-pro:focus { border-color: #3b82f6; background: white; }
    </style>
</head>
<body class="p-4 md:p-10 pb-20">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-800 text-slate-900 tracking-tight">Mi <span class="text-blue-600 font-black">Presupuesto</span></h1>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Análisis de Flujo de Caja</p>
            </div>
            <button onclick="resetData()" class="bg-rose-50 text-rose-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Limpiar Mes</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="card-pro p-8 bg-slate-900 text-white shadow-xl shadow-blue-100">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Disponible Real</p>
                <h2 id="net-balance" class="text-5xl font-800 tracking-tighter">$0.00</h2>
            </div>
            <div class="card-pro p-8 flex flex-col justify-center">
                <p class="text-[10px] font-bold text-emerald-500 uppercase mb-1">Ingresos Totales</p>
                <h3 id="inc-total" class="text-3xl font-800 text-slate-800">$0.00</h3>
            </div>
            <div class="card-pro p-8 flex flex-col justify-center">
                <p class="text-[10px] font-bold text-rose-500 uppercase mb-1">Gastos Ejecutados</p>
                <h3 id="exp-total" class="text-3xl font-800 text-slate-800">$0.00</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="card-pro p-6">
                    <h3 class="font-800 text-xs uppercase mb-4 text-slate-500">Nuevo Movimiento</h3>
                    <div class="space-y-4">
                        <input type="text" id="desc" placeholder="Concepto (ej. Alquiler)" class="input-pro">
                        <div class="grid grid-cols-2 gap-3">
                            <input type="number" id="amt" placeholder="Monto $" class="input-pro">
                            <select id="type" class="input-pro font-bold">
                                <option value="exp">📉 Gasto</option>
                                <option value="inc">📈 Ingreso</option>
                            </select>
                        </div>
                        <button onclick="addEntry()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black shadow-lg shadow-blue-100 hover:bg-blue-700 transition-all">REGISTRAR</button>
                    </div>
                </div>

                <div class="card-pro p-6">
                    <h3 class="font-800 text-xs uppercase mb-6 text-center text-slate-500">Distribución por Rubro</h3>
                    <div class="h-64">
                        <canvas id="budgetChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="card-pro overflow-hidden">
                    <div class="p-6 border-b border-slate-50 flex justify-between items-center bg-slate-50/50">
                        <h3 class="font-800 text-xs uppercase text-slate-500">Libro Diario</h3>
                        <span id="date-now" class="text-[10px] font-black text-slate-400"></span>
                    </div>
                    <div id="history-list" class="divide-y divide-slate-50 max-h-[600px] overflow-y-auto">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('expert_budget_v1')) || [];
        let chartInstance;

        function initChart() {
            const ctx = document.getElementById('budgetChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: [],
                    datasets: [{
                        data: [],
                        backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899'],
                        borderWidth: 0,
                    }]
                },
                options: { cutout: '75%', plugins: { legend: { position: 'bottom', labels: { boxWidth: 8, font: { size: 10, weight: 'bold' } } } } }
            });
        }

        function addEntry() {
            const desc = document.getElementById('desc').value;
            const amt = parseFloat(document.getElementById('amt').value);
            const type = document.getElementById('type').value;
            if(!desc || !amt) return;

            db.unshift({ 
                desc, amt, type, 
                id: Date.now(), 
                date: new Date().toLocaleDateString('es-VE', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'}) 
            });
            
            document.getElementById('desc').value = '';
            document.getElementById('amt').value = '';
            render();
        }

        function render() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            let i = 0, e = 0, cats = {};

            db.forEach(item => {
                if(item.type === 'inc') i += item.amt;
                else {
                    e += item.amt;
                    cats[item.desc] = (cats[item.desc] || 0) + item.amt;
                }

                const row = document.createElement('div');
                row.className = "p-5 flex justify-between items-center hover:bg-slate-50 transition-all";
                row.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-1.5 h-10 rounded-full ${item.type === 'inc' ? 'bg-emerald-400' : 'bg-rose-400'}"></div>
                        <div>
                            <p class="font-bold text-slate-800 text-sm">${item.desc}</p>
                            <p class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">${item.date}</p>
                        </div>
                    </div>
                    <p class="font-900 ${item.type === 'inc' ? 'text-emerald-500' : 'text-slate-900'} text-lg">
                        ${item.type === 'inc' ? '+' : '-'}$${item.amt.toFixed(2)}
