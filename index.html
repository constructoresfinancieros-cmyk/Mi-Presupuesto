<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EcoBudget | Smart Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f0f4f8; 
            color: #1a202c;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .tab-bar {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(0,0,0,0.05);
        }
        .btn-primary {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }
        .expense-item {
            transition: transform 0.2s;
        }
        .expense-item:active { transform: scale(0.98); }
        input, select {
            border: 1px solid #edf2f7 !important;
            transition: all 0.3s;
        }
        input:focus {
            border-color: #2ecc71 !important;
            background: white !important;
        }
        /* Ocultar scrollbar */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-28">

    <div class="p-6 flex justify-between items-center">
        <div>
            <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Mi Billetera</p>
            <h1 class="text-2xl font-extrabold text-slate-800">EcoBudget <span class="text-green-500">Pro</span></h1>
        </div>
        <div class="bg-white p-2 rounded-full shadow-sm">
            <span class="text-xl">🇺🇸</span>
        </div>
    </div>

    <div class="px-6">
        <div class="glass-card p-6 mb-6">
            <p class="text-sm font-semibold text-gray-500 mb-1 text-center">Disponible para gastar</p>
            <h2 id="balance" class="text-5xl font-black text-center text-slate-900 mb-4">$0.00</h2>
            
            <div class="space-y-2">
                <div class="w-full bg-gray-100 h-3 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-green-500 transition-all duration-700" style="width: 0%"></div>
                </div>
                <div class="flex justify-between items-center px-1">
                    <span id="status-text" class="text-[10px] font-extrabold uppercase text-green-500">Presupuesto Sano</span>
                    <span id="percent-val" class="text-[10px] font-bold text-gray-400">0%</span>
                </div>
            </div>
        </div>

        <div class="glass-card p-5 mb-8 border border-white">
            <h3 class="text-sm font-bold text-slate-700 mb-4 flex items-center">
                <span class="bg-green-100 text-green-600 p-1 rounded-md mr-2">＋</span> Registro Rápido
            </h3>
            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="desc" placeholder="¿En qué gastaste?" class="col-span-2 p-4 rounded-2xl bg-gray-50 text-sm focus:outline-none">
                <input type="number" id="amount" placeholder="Monto $" class="p-4 rounded-2xl bg-gray-50 text-sm focus:outline-none">
                <select id="type" class="p-4 rounded-2xl bg-gray
